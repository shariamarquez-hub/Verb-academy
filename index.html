<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb Academy: Legend Edition</title>
    <style>
        :root {
            --primary: #6c5ce7; --success: #1dd1a1; --bg: #f0f4f8;
            --font-main: 'Segoe UI', sans-serif;
        }

        /* ESTILO CRAYÓN (NIÑOS) */
        .kids-theme { 
            background: #fff9e6 !important; 
            font-family: 'Comic Sans MS', cursive !important;
            border: 8px solid #ffcc00;
        }
        .kids-theme .btn { border-radius: 50px; border: 4px dashed #fff; }

        /* TEMAS ADOLESCENTES */
        .theme-hellokitty { --primary: #ff9ff3; --bg: #fff0f5; }
        .theme-batman { --primary: #2d3436; --bg: #1e272e; color: #f1c40f; }
        .theme-deadpool { --primary: #d63031; --bg: #2d3436; color: white; }

        body { font-family: var(--font-main); background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: 0.5s; }
        .app { background: white; width: 95%; max-width: 500px; padding: 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; position: relative; }
        
        .view { display: none; }
        .view.active { display: block; animation: zoomIn 0.3s; }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; color: white; background: var(--primary); transition: 0.2s; }
        .btn:hover { filter: brightness(1.1); }

        .card { background: #fff; border: 3px solid #eee; padding: 20px; border-radius: 20px; margin: 15px 0; color: #333; }
        .img-emoji { font-size: 5rem; display: block; margin-bottom: 10px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; text-align: center; font-size: 1rem; }

        .lives { font-size: 1.5rem; color: #ff4757; margin-bottom: 10px; }
        
        /* DIPLOMA */
        #diploma { background: #fffceb; border: 10px double #d4af37; padding: 30px; color: #333; }
    </style>
</head>
<body id="body-bg">

<div class="app" id="app-box">
    <div id="view-login" class="view">
        <h1>🎒 Verb Academy</h1>
        <p>¡Bienvenido de nuevo!</p>
        <input type="text" id="user-name" placeholder="Tu nombre">
        <button class="btn" onclick="saveUser()">Comenzar</button>
    </div>

    <div id="view-menu" class="view">
        <h2 id="welcome-msg"></h2>
        <div class="lives">❤️ <span id="lives-count">3</span> | ⭐ <span id="xp-count">0</span></div>
        <button class="btn" style="background:#ff6b81" onclick="selectMode('kids')">🧸 Modo Niños (Crayón)</button>
        <button class="btn" style="background:#6c5ce7" onclick="showThemeSelect()">⚡ Modo Adolescente (Temas)</button>
    </div>

    <div id="view-themes" class="view">
        <h2>Elige tu estilo:</h2>
        <button class="btn" style="background:#ff9ff3" onclick="selectMode('teens', 'hellokitty')">Hello Kitty 🎀</button>
        <button class="btn" style="background:#2d3436; color:#f1c40f" onclick="selectMode('teens', 'batman')">Batman 🦇</button>
        <button class="btn" style="background:#d63031" onclick="selectMode('teens', 'deadpool')">Deadpool ⚔️</button>
    </div>

    <div id="view-levels" class="view">
        <h2 id="lvl-head">Niveles</h2>
        <button class="btn" onclick="startLevel(0)">Nivel 1: Esenciales</button>
        <button class="btn" onclick="startLevel(1)">Nivel 2: Intermedio</button>
        <button class="btn" onclick="startLevel(2)">Nivel 3: Maestro</button>
        <button onclick="location.reload()" style="background:none; border:none; color:gray; cursor:pointer;">← Salir</button>
    </div>

    <div id="view-study" class="view">
        <div class="card">
            <span id="st-img" class="img-emoji"></span>
            <h2 id="st-es"></h2>
            <button class="btn" onclick="speakCurrent()" style="background:#00d2d3">Escuchar Pronunciación 🔊</button>
            <p>V1: <b id="st-v1"></b> | V2: <b id="st-v2"></b> | V3: <b id="st-v3"></b></p>
        </div>
        <button class="btn" id="study-btn" onclick="nextStudy()">Siguiente</button>
    </div>

    <div id="view-practice" class="view">
        <h2 id="pr-es"></h2>
        <input type="text" id="in1" placeholder="Presente">
        <input type="text" id="in2" placeholder="Pasado">
        <input type="text" id="in3" placeholder="Participio">
        <button class="btn" style="background:var(--success)" onclick="checkAnswer()">Comprobar ✅</button>
    </div>

    <div id="view-win" class="view">
        <div id="diploma">
            <h1 style="color:#d4af37">🏆 DIPLOMA 🏆</h1>
            <p>Se otorga con honor a:</p>
            <h2 id="dip-name"></h2>
            <p>Por dominar los verbos en inglés en el nivel seleccionado.</p>
            <small id="dip-date"></small>
        </div>
        <button class="btn" onclick="location.reload()">Volver a jugar</button>
    </div>
</div>

<script>
    const database = {
        kids: [
            [{es:"Correr", img:"🏃", v1:"run", v2:"ran", v3:"run"}, {es:"Saltar", img:"🦘", v1:"jump", v2:"jumped", v3:"jumped"}],
            [{es:"Comer", img:"🍎", v1:"eat", v2:"ate", v3:"eaten"}],
            [{es:"Volar", img:"✈️", v1:"fly", v2:"flew", v3:"flown"}]
        ],
        teens: [
            [{es:"Hacer", img:"⚙️", v1:"do", v2:"did", v3:"done"}, {es:"Tener", img:"🤲", v1:"have", v2:"had", v3:"had"}],
            [{es:"Comprar", img:"🛒", v1:"buy", v2:"bought", v3:"bought"}],
            [{es:"Romper", img:"💔", v1:"break", v2:"broke", v3:"broken"}]
        ]
    };

    let user = { name: "", xp: 0, lives: 3 };
    let curMode = "", curLvl = 0, curIdx = 0;

    // CARGAR PROGRESO AL INICIAR
    window.onload = () => {
        const saved = localStorage.getItem('verbUser');
        if(saved) {
            user = JSON.parse(saved);
            showMenu();
        } else {
            showView('view-login');
        }
    };

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function saveUser() {
        user.name = document.getElementById('user-name').value || "Explorador";
        localStorage.setItem('verbUser', JSON.stringify(user));
        showMenu();
    }

    function showMenu() {
        document.getElementById('welcome-msg').innerText = `¡Hola, ${user.name}!`;
        document.getElementById('xp-count').innerText = user.xp;
        document.getElementById('lives-count').innerText = user.lives;
        showView('view-menu');
    }

    function showThemeSelect() { showView('view-themes'); }

    function selectMode(mode, theme = '') {
        curMode = mode;
        const appBox = document.getElementById('app-box');
        const body = document.getElementById('body-bg');
        
        // Limpiar estilos anteriores
        appBox.className = "app";
        body.className = "";

        if(mode === 'kids') appBox.classList.add('kids-theme');
        if(theme) {
            body.classList.add(`theme-${theme}`);
            document.documentElement.style.setProperty('--primary', 
                theme === 'hellokitty' ? '#ff9ff3' : (theme === 'batman' ? '#2d3436' : '#d63031'));
        }
        showView('view-levels');
    }

    function startLevel(lvl) {
        curLvl = lvl; curIdx = 0;
        showView('view-study');
        updateStudy();
    }

    function updateStudy() {
        const v = database[curMode][curLvl][curIdx];
        document.getElementById('st-img').innerText = v.img;
        document.getElementById('st-es').innerText = v.es;
        document.getElementById('st-v1').innerText = v.v1;
        document.getElementById('st-v2').innerText = v.v2;
        document.getElementById('st-v3').innerText = v.v3;
        speakCurrent();
    }

    function speakCurrent() {
        const v = database[curMode][curLvl][curIdx];
        const msg = new SpeechSynthesisUtterance(`${v.v1}, ${v.v2}, ${v.v3}`);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function nextStudy() {
        if(curIdx < database[curMode][curLvl].length - 1) {
            curIdx++; updateStudy();
        } else {
            curIdx = 0; showView('view-practice'); loadPractice();
        }
    }

    function loadPractice() {
        const v = database[curMode][curLvl][curIdx];
        document.getElementById('pr-es').innerText = `¿${v.es}?`;
        document.querySelectorAll('#view-practice input').forEach(i => i.value = "");
    }

    function checkAnswer() {
        const v = database[curMode][curLvl][curIdx];
        const r = [document.getElementById('in1').value.trim().toLowerCase(), 
                   document.getElementById('in2').value.trim().toLowerCase(), 
                   document.getElementById('in3').value.trim().toLowerCase()];

        if(r[0] === v.v1 && r[1] === v.v2 && r[2] === v.v3) {
            new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3').play();
            user.xp += 10;
            curIdx++;
            if(curIdx < database[curMode][curLvl].length) loadPractice();
            else showDiploma();
        } else {
            user.lives--;
            alert("¡Error! Pierdes una vida ❤️");
            if(user.lives <= 0) { alert("¡Sin vidas! Reiniciando..."); location.reload(); }
        }
        localStorage.setItem('verbUser', JSON.stringify(user));
        updateUI();
    }

    function updateUI() {
        document.getElementById('xp-count').innerText = user.xp;
        document.getElementById('lives-count').innerText = user.lives;
    }

    function showDiploma() {
        document.getElementById('dip-name').innerText = user.name;
        document.getElementById('dip-date').innerText = new Date().toLocaleDateString();
        showView('view-win');
    }
</script>
</body>
</html>
