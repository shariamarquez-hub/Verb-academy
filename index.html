<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb Academy: Kitty Edition</title>
    <style>
        :root {
            --primary: #6c5ce7; --success: #1dd1a1; --bg: #f0f4f8;
            --pink-kitty: #ff9ff3; --blue-hat: #4834d4;
        }

        /* ESTILOS TEMAS */
        .kids-theme { background: #fff9e6 !important; font-family: 'Comic Sans MS', cursive !important; }
        .theme-hellokitty { --primary: #ff9ff3; --bg: #fff0f5; }
        .theme-batman { --primary: #2d3436; --bg: #1e272e; color: #f1c40f; }
        .theme-deadpool { --primary: #d63031; --bg: #2d3436; color: white; }

        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: 0.5s; overflow-x: hidden; }
        .app { background: white; width: 95%; max-width: 500px; padding: 25px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; position: relative; z-index: 10; }
        
        /* ASISTENTE GATITO */
        .kitty-container { position: fixed; bottom: 10px; right: 10px; width: 120px; text-align: center; z-index: 100; pointer-events: none; transition: 0.3s; display: none; }
        .kitty-body { font-size: 50px; position: relative; animation: bounce 2s infinite; }
        .kitty-hat { position: absolute; top: -15px; left: 15px; font-size: 25px; }
        .kitty-bubble { background: white; border-radius: 15px; padding: 8px; font-size: 12px; border: 2px solid var(--pink-kitty); margin-bottom: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .heart-pop { position: absolute; top: -30px; left: 40px; color: red; font-size: 20px; opacity: 0; transition: 0.5s; }
        .heart-active { opacity: 1; transform: translateY(-20px); }

        /* VISTAS */
        .view { display: none; }
        .view.active { display: block; animation: zoomIn 0.3s; }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .btn { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; color: white; background: var(--primary); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; text-align: center; box-sizing: border-box; }
        
        .slider-box { background: #eee; padding: 10px; border-radius: 10px; margin: 10px 0; font-size: 14px; color: #333; }
        #summary-list { text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body id="body-bg">

<div id="kitty-asist" class="kitty-container">
    <div id="kitty-bubble" class="kitty-bubble">¡Hola!</div>
    <div class="kitty-body">
        <span class="kitty-hat">👒</span>
        🐱
        <span id="heart" class="heart-pop">❤️</span>
    </div>
</div>

<div class="app" id="app-box">
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <div id="view-login" class="view">
        <h1>🎒 Verb Academy</h1>
        <input type="text" id="user-name" placeholder="Tu nombre">
        <button class="btn" onclick="saveUser()">Comenzar</button>
    </div>

    <div id="view-menu" class="view">
        <h2 id="welcome-msg"></h2>
        <button class="btn" style="background:var(--pink-kitty)" onclick="selectMode('kids')">🧸 Modo Niños</button>
        <button class="btn" style="background:var(--primary)" onclick="showView('view-themes')">⚡ Modo Adolescente</button>
        <button class="btn" style="background:#ffa502" onclick="startKittyGame()">🎮 Juego: Alimenta al Gatito</button>
    </div>

    <div id="view-themes" class="view">
        <h2>Temas:</h2>
        <button class="btn" style="background:#ff9ff3" onclick="selectMode('teens', 'hellokitty')">Hello Kitty 🎀</button>
        <button class="btn" style="background:#2d3436; color:#f1c40f" onclick="selectMode('teens', 'batman')">Batman 🦇</button>
        <button class="btn" style="background:#d63031" onclick="selectMode('teens', 'deadpool')">Deadpool ⚔️</button>
    </div>

    <div id="view-levels" class="view">
        <h2>Niveles</h2>
        <button class="btn" onclick="startLevel(0)">Nivel 1</button>
        <button class="btn" onclick="startLevel(1)">Nivel 2</button>
        <button class="btn" onclick="startLevel(2)">Nivel 3</button>
    </div>

    <div id="view-study" class="view">
        <h2 id="st-es"></h2>
        <div class="slider-box">
            Velocidad de voz: <input type="range" id="voice-speed" min="0.5" max="1.5" step="0.1" value="1">
        </div>
        <button class="btn" style="background:#00d2d3" onclick="speakCurrent()">Escuchar 🔊</button>
        <button class="btn" onclick="nextStudy()">Siguiente</button>
    </div>

    <div id="view-practice" class="view">
        <h2 id="pr-es"></h2>
        <input type="text" id="in1" placeholder="Presente">
        <input type="text" id="in2" placeholder="Pasado">
        <input type="text" id="in3" placeholder="Participio">
        <button class="btn" style="background:var(--success)" onclick="checkAnswer()">Comprobar</button>
    </div>

    <div id="view-results" class="view">
        <h2>📊 Resumen de Nivel</h2>
        <div id="summary-list"></div>
        <button class="btn" onclick="showView('view-menu')">Volver al Menú</button>
    </div>
</div>

<script>
    const database = {
        kids: [
            [{es:"Correr", v1:"run", v2:"ran", v3:"run"}, {es:"Saltar", v1:"jump", v2:"jumped", v3:"jumped"}],
            [{es:"Comer", v1:"eat", v2:"ate", v3:"eaten"}]
        ],
        teens: [
            [{es:"Hacer", v1:"do", v2:"did", v3:"done"}, {es:"Tener", v1:"have", v2:"had", v3:"had"}],
            [{es:"Comprar", v1:"buy", v2:"bought", v3:"bought"}]
        ]
    };

    let user = { name: "", xp: 0 };
    let curMode = "", curLvl = 0, curIdx = 0, results = [];
    let isGameMode = false;

    window.onload = () => {
        const saved = localStorage.getItem('verbUserV2');
        if(saved) { user = JSON.parse(saved); showMenu(); } 
        else { showView('view-login'); }
    };

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        // Gatito solo en niños o juego
        document.getElementById('kitty-asist').style.display = (curMode === 'kids' || isGameMode) ? 'block' : 'none';
    }

    function saveUser() {
        user.name = document.getElementById('user-name').value || "Estudiante";
        localStorage.setItem('verbUserV2', JSON.stringify(user));
        showMenu();
    }

    function showMenu() {
        document.getElementById('welcome-msg').innerText = `¡Hola, ${user.name}!`;
        showView('view-menu');
        document.getElementById('bg-music').play().catch(e => console.log("Click para música"));
    }

    function selectMode(mode, theme = '') {
        curMode = mode; isGameMode = false;
        const appBox = document.getElementById('app-box');
        appBox.className = "app"; 
        if(mode === 'kids') {
            appBox.classList.add('kids-theme');
            updateKitty("¡Tú puedes! 🐾");
        }
        if(theme) document.getElementById('body-bg').className = `theme-${theme}`;
        showView('view-levels');
    }

    function startLevel(lvl) {
        curLvl = lvl; curIdx = 0; results = [];
        showView('view-study');
        updateStudy();
    }

    function updateStudy() {
        const v = database[curMode][curLvl][curIdx];
        document.getElementById('st-es').innerText = v.es;
    }

    function speakCurrent() {
        const v = (isGameMode) ? database.kids[0][curIdx] : database[curMode][curLvl][curIdx];
        const msg = new SpeechSynthesisUtterance(`${v.v1}, ${v.v2}, ${v.v3}`);
        msg.rate = document.getElementById('voice-speed').value;
        window.speechSynthesis.speak(msg);
    }

    function nextStudy() {
        if(curIdx < database[curMode][curLvl].length - 1) { curIdx++; updateStudy(); }
        else { curIdx = 0; showView('view-practice'); loadPractice(); }
    }

    function loadPractice() {
        const v = (isGameMode) ? database.kids[0][curIdx] : database[curMode][curLvl][curIdx];
        document.getElementById('pr-es').innerText = `¿${v.es}?`;
        document.querySelectorAll('#view-practice input').forEach(i => i.value = "");
    }

    function checkAnswer() {
        const v = (isGameMode) ? database.kids[0][curIdx] : database[curMode][curLvl][curIdx];
        const r = [document.getElementById('in1').value.trim().toLowerCase(), 
                   document.getElementById('in2').value.trim().toLowerCase(), 
                   document.getElementById('in3').value.trim().toLowerCase()];

        const correct = (r[0] === v.v1 && r[1] === v.v2 && r[2] === v.v3);
        
        if(correct) {
            results.push({verb: v.es, status: '✅ Bien'});
            if(isGameMode) kittyHappy();
        } else {
            results.push({verb: v.es, status: '❌ Error (era: '+v.v1+')'});
            updateKitty("¡No te rindas! 🍎");
        }

        curIdx++;
        const limit = isGameMode ? database.kids[0].length : database[curMode][curLvl].length;

        if(curIdx < limit) {
            loadPractice();
        } else {
            showSummary();
        }
    }

    function showSummary() {
        let html = "<ul>";
        results.forEach(r => html += `<li>${r.verb}: ${r.status}</li>`);
        html += "</ul><p><b>¡Sigue practicando, vas muy bien! 🚀</b></p>";
        document.getElementById('summary-list').innerHTML = html;
        showView('view-results');
    }

    function updateKitty(msg) {
        document.getElementById('kitty-bubble').innerText = msg;
    }

    function kittyHappy() {
        updateKitty("¡Mmmm, rico! 🍖");
        const h = document.getElementById('heart');
        h.classList.add('heart-active');
        setTimeout(() => h.classList.remove('heart-active'), 1000);
    }

    function startKittyGame() {
        isGameMode = true; curMode = 'kids'; curIdx = 0; results = [];
        updateKitty("¿Me das comida? 🐟");
        showView('view-practice');
        loadPractice();
    }
</script>
</body>
</html>
