<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verb Academy: Kids & Teens</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --kids-bg: #f7f1e3;
            --teens-bg: #2d3436;
            --accent-pink: #ff6b81;
            --accent-green: #1dd1a1;
        }

        body {
            font-family: 'Segoe UI', 'Comic Sans MS', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.5s;
        }

        .app-container {
            background: white;
            border-radius: 30px;
            padding: 2rem;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        /* VISTAS */
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* MENU PRINCIPAL */
        .menu-btn {
            padding: 20px;
            margin: 15px 0;
            border: none;
            border-radius: 20px;
            width: 100%;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }
        .btn-kids { background: var(--accent-pink); box-shadow: 0 8px 0 #e66767; }
        .btn-teens { background: var(--primary); box-shadow: 0 8px 0 #4834d4; }
        .menu-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #000; }

        /* ESTILO INFANTES */
        .kids-mode .verb-display { font-size: 3.5rem; color: var(--accent-pink); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* ESTILO ADOLESCENTES */
        .teens-mode { background: #fff; border-top: 10px solid var(--primary); }
        .teens-mode h2 { color: var(--primary); }

        /* COMUNES */
        .progress-bar { height: 10px; background: #eee; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent-green); width: 0%; transition: width 0.5s; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 12px; text-align: center; font-size: 1.1rem; box-sizing: border-box; }
        .check-btn { background: var(--accent-green); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 1.2rem; cursor: pointer; margin-top: 10px; }
        .back-btn { background: none; border: none; color: #888; text-decoration: underline; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body id="main-body">

<div class="app-container">
    <div id="view-menu" class="view active">
        <h1>🎓 Verb Academy</h1>
        <p>¿Quién va a practicar hoy?</p>
        <button class="menu-btn btn-kids" onclick="startApp('kids')">🧸 Niños<br><small>(Preescolar)</small></button>
        <button class="menu-btn btn-teens" onclick="startApp('teens')">⚡ Adolescentes<br><small>(Nivel Pro)</small></button>
    </div>

    <div id="view-game" class="view">
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <h2 id="mode-title">Modo</h2>
        <div id="display-area">
            <h1 id="verb-es" class="verb-display">...</h1>
            <button id="audio-btn" style="font-size: 2rem; background: none; border: none; cursor: pointer;">🔊</button>
        </div>
        
        <div id="input-container">
            <input type="text" id="v1" placeholder="Presente">
            <input type="text" id="v2" placeholder="Pasado Simple">
            <input type="text" id="v3" placeholder="Pasado Participio">
        </div>
        
        <button class="check-btn" onclick="handleCheck()">¡LISTO! ✅</button>
        <button class="back-btn" onclick="location.reload()">⬅ Volver al Menú</button>
    </div>
</div>

<script>
    const verbs = [
        { es: "Correr 🏃", v1: "run", v2: "ran", v3: "run" },
        { es: "Cantar 🎤", v1: "sing", v2: "sang", v3: "sung" },
        { es: "Comer 🍎", v1: "eat", v2: "ate", v3: "eaten" },
        { es: "Dormir 😴", v1: "sleep", v2: "slept", v3: "slept" },
        { es: "Ir 🚗", v1: "go", v2: "went", v3: "gone" }
    ];

    let currentIdx = 0;
    let currentMode = '';

    function startApp(mode) {
        currentMode = mode;
        document.getElementById('view-menu').classList.remove('active');
        document.getElementById('view-game').classList.add('active');
        
        if(mode === 'kids') {
            document.body.style.background = "var(--kids-bg)";
            document.getElementById('mode-title').innerText = "🎈 ¡A jugar!";
            document.getElementById('verb-es').classList.add('verb-display');
        } else {
            document.body.style.background = "var(--teens-bg)";
            document.getElementById('mode-title').innerText = "🧠 Entrenamiento Pro";
            document.getElementById('verb-es').classList.remove('verb-display');
            document.getElementById('verb-es').style.fontSize = "2.5rem";
        }
        loadVerb();
    }

    function loadVerb() {
        const v = verbs[currentIdx];
        document.getElementById('verb-es').innerText = v.es;
        document.querySelectorAll('input').forEach(i => i.value = "");
        updateUI();
        if(currentMode === 'kids') speak();
    }

    function speak() {
        const v = verbs[currentIdx];
        const msg = new SpeechSynthesisUtterance(`${v.v1}, ${v.v2}, ${v.v3}`);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    document.getElementById('audio-btn').onclick = speak;

    function handleCheck() {
        const v = verbs[currentIdx];
        const userV1 = document.getElementById('v1').value.trim().toLowerCase();
        const userV2 = document.getElementById('v2').value.trim().toLowerCase();
        const userV3 = document.getElementById('v3').value.trim().toLowerCase();

        if(userV1 === v.v1 && userV2 === v.v2 && userV3 === v.v3) {
            currentIdx++;
            if(currentIdx >= verbs.length) {
                alert("¡Felicidades! Has terminado.");
                location.reload();
            } else {
                loadVerb();
            }
        } else {
            alert("¡Casi! Intenta de nuevo.");
        }
    }

    function updateUI() {
        const percent = (currentIdx / verbs.length) * 100;
        document.getElementById('progress').style.width = percent + "%";
    }
</script>
</body>
</html>
